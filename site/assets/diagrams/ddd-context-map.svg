<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">DDD context map</title>
  <desc id="desc">Bounded contexts, context relationships, and tactical design elements for an order system.</desc>
  <rect width="1280" height="720" fill="#fffdf8"/>
  <text x="68" y="82" font-family="Georgia,serif" font-size="34" font-weight="700" fill="#1f2328">DDD: from problem space to bounded contexts</text>
  <text x="68" y="120" font-family="Avenir Next,Arial,sans-serif" font-size="18" fill="#667078">答题顺序：业务域/子域 → 通用语言 → 限界上下文 → 上下文映射 → 聚合/实体/值对象/领域事件。</text>
  <g font-family="Avenir Next,Arial,sans-serif">
    <rect x="80" y="180" width="295" height="310" fill="#ffffff" stroke="#b54634" stroke-width="3"/>
    <text x="110" y="225" font-size="23" font-weight="700" fill="#b54634">Ordering Context</text>
    <text x="110" y="265" font-size="18" fill="#1f2328">Aggregate: Order</text>
    <text x="110" y="295" font-size="18" fill="#1f2328">Entity: OrderItem</text>
    <text x="110" y="325" font-size="18" fill="#1f2328">Value: Address</text>
    <text x="110" y="355" font-size="18" fill="#1f2328">Event: OrderPlaced</text>
    <text x="110" y="400" font-size="15" fill="#667078">订单上下文只维护订单不变量，</text>
    <text x="110" y="424" font-size="15" fill="#667078">不直接修改支付/库存内部模型。</text>
    <rect x="492" y="180" width="295" height="310" fill="#ffffff" stroke="#355f91" stroke-width="3"/>
    <text x="522" y="225" font-size="23" font-weight="700" fill="#355f91">Payment Context</text>
    <text x="522" y="265" font-size="18" fill="#1f2328">Aggregate: Payment</text>
    <text x="522" y="295" font-size="18" fill="#1f2328">Policy: retry / compensate</text>
    <text x="522" y="325" font-size="18" fill="#1f2328">Event: PaymentConfirmed</text>
    <text x="522" y="400" font-size="15" fill="#667078">支付上下文暴露接口和事件，</text>
    <text x="522" y="424" font-size="15" fill="#667078">隐藏渠道接入细节。</text>
    <rect x="904" y="180" width="295" height="310" fill="#ffffff" stroke="#14756f" stroke-width="3"/>
    <text x="934" y="225" font-size="23" font-weight="700" fill="#14756f">Inventory Context</text>
    <text x="934" y="265" font-size="18" fill="#1f2328">Aggregate: Stock</text>
    <text x="934" y="295" font-size="18" fill="#1f2328">Service: ReserveStock</text>
    <text x="934" y="325" font-size="18" fill="#1f2328">Event: StockReserved</text>
    <text x="934" y="400" font-size="15" fill="#667078">库存模型独立演化，</text>
    <text x="934" y="424" font-size="15" fill="#667078">通过事件与订单协同。</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1f2328"/>
    </marker>
  </defs>
  <path d="M375 298 L492 298" stroke="#1f2328" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="400" y="278" font-family="Avenir Next,Arial,sans-serif" font-size="15" fill="#1f2328">Customer/Supplier</text>
  <path d="M787 298 L904 298" stroke="#1f2328" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="810" y="278" font-family="Avenir Next,Arial,sans-serif" font-size="15" fill="#1f2328">Published Language</text>
  <rect x="210" y="555" width="860" height="70" fill="#f0eadf" stroke="#d9d2c4" stroke-width="2"/>
  <text x="240" y="598" font-family="Avenir Next,Arial,sans-serif" font-size="20" font-weight="700" fill="#1f2328">Event storming helps discover commands, events, aggregates, and boundaries before drawing architecture.</text>
</svg>
