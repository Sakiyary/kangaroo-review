<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1000" viewBox="0 0 1680 1000" role="img" aria-labelledby="title desc">
  <title id="title">设计决定七分类</title>
  <desc id="desc">复习课 review-1 slide 的七类设计决定，配每类考场展开例子。</desc>
  <defs>
    <style>
      .bg{fill:#fffdf8}.panel{fill:#fff;stroke:#d9d2c4;stroke-width:2}.center{fill:#1f2328}.box{fill:#fff;stroke:#b54634;stroke-width:2}.box2{fill:#e9eef5;stroke:#38669b;stroke-width:2}.box3{fill:#e9f4f2;stroke:#14756f;stroke-width:2}.box4{fill:#fff7e8;stroke:#bd861b;stroke-width:2}.line{stroke:#d9d2c4;stroke-width:3}
      .title{font:700 38px Georgia,"Times New Roman","PingFang SC",serif;fill:#1f2328}.sub{font:600 18px "Avenir Next","PingFang SC",sans-serif;fill:#667078}.white{font:800 26px "Avenir Next","PingFang SC",sans-serif;fill:#fff}.h{font:800 23px "Avenir Next","PingFang SC",sans-serif;fill:#1f2328}.txt{font:500 18px "Avenir Next","PingFang SC",sans-serif;fill:#1f2328}.small{font:500 15px "Avenir Next","PingFang SC",sans-serif;fill:#667078}
    </style>
  </defs>
  <rect class="bg" width="1680" height="1000"/>
  <text class="title" x="54" y="64">设计决定七分类：架构不是只画图</text>
  <text class="sub" x="54" y="98">Ground truth: Lecture 14 softarch2026-review-1 page 7. 答题按“决策项 -> 例子 -> 影响质量属性/取舍”展开。</text>
  <circle class="center" cx="840" cy="500" r="150"/>
  <text class="white" x="840" y="474" text-anchor="middle">Architecture</text>
  <text class="white" x="840" y="512" text-anchor="middle">= structures</text>
  <text class="white" x="840" y="550" text-anchor="middle">+ decisions</text>

  <g>
    <path class="line" d="M720 420L330 240"/><path class="line" d="M840 350L840 170"/><path class="line" d="M960 420L1350 240"/>
    <path class="line" d="M690 520L300 520"/><path class="line" d="M990 520L1380 520"/>
    <path class="line" d="M740 615L410 760"/><path class="line" d="M940 615L1270 760"/>
  </g>

  <rect class="box" x="92" y="160" width="420" height="148" rx="14"/>
  <text class="h" x="122" y="204">1. 职责分配</text>
  <text class="txt" x="122" y="244">谁负责功能和质量责任？</text>
  <text class="small" x="122" y="278">例：Auth Service 负责身份校验。</text>
  <rect class="box2" x="630" y="80" width="420" height="148" rx="14"/>
  <text class="h" x="660" y="124">2. 协调模型</text>
  <text class="txt" x="660" y="164">组件如何通信、同步、协作？</text>
  <text class="small" x="660" y="198">例：同步 REST、异步事件、Broker。</text>
  <rect class="box3" x="1168" y="160" width="420" height="148" rx="14"/>
  <text class="h" x="1198" y="204">3. 数据模型</text>
  <text class="txt" x="1198" y="244">有哪些数据，谁拥有，如何一致？</text>
  <text class="small" x="1198" y="278">例：订单服务拥有订单数据。</text>
  <rect class="box4" x="92" y="450" width="420" height="148" rx="14"/>
  <text class="h" x="122" y="494">4. 资源管理</text>
  <text class="txt" x="122" y="534">CPU、线程、连接、缓存如何分配？</text>
  <text class="small" x="122" y="568">例：线程池、限流、连接池。</text>
  <rect class="box" x="1168" y="450" width="420" height="148" rx="14"/>
  <text class="h" x="1198" y="494">5. 架构元素映射</text>
  <text class="txt" x="1198" y="534">模块、运行时组件、部署节点如何对应？</text>
  <text class="small" x="1198" y="568">例：模块实现服务，服务部署到容器。</text>
  <rect class="box2" x="182" y="724" width="520" height="148" rx="14"/>
  <text class="h" x="212" y="768">6. 绑定时间</text>
  <text class="txt" x="212" y="808">变化点在编译、部署、启动、运行时绑定？</text>
  <text class="small" x="212" y="842">晚绑定更灵活，但测试组合和运行不确定性更高。</text>
  <rect class="box3" x="978" y="724" width="520" height="148" rx="14"/>
  <text class="h" x="1008" y="768">7. 技术选择</text>
  <text class="txt" x="1008" y="808">框架、中间件、数据库、云平台怎么选？</text>
  <text class="small" x="1008" y="842">要解释理由、约束和质量属性影响。</text>
  <text class="small" x="54" y="948">考场句式：每类设计决定都要能落到具体系统，不要只把七个英文名列出来。</text>
</svg>
