<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">ADD 3.0 iterative roadmap</title>
  <desc id="desc">Attribute-Driven Design steps as an iterative architecture design loop.</desc>
  <rect width="1280" height="720" fill="#fffdf8"/>
  <text x="68" y="82" font-family="Georgia,serif" font-size="34" font-weight="700" fill="#1f2328">ADD 3.0: answer as an iteration loop</text>
  <text x="68" y="120" font-family="Avenir Next,Arial,sans-serif" font-size="18" fill="#667078">背法：目标和驱动因素在前，设计概念在中间，实例化/接口/文档/评审在后，最后重复。</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#14756f"/>
    </marker>
  </defs>
  <g font-family="Avenir Next,Arial,sans-serif" font-size="17">
    <rect x="68" y="185" width="220" height="104" fill="#ffffff" stroke="#b54634" stroke-width="3"/>
    <text x="92" y="225" font-weight="700" fill="#b54634">1 Establish goal</text>
    <text x="92" y="255" fill="#1f2328">scope, stakeholders,</text>
    <text x="92" y="280" fill="#1f2328">iteration objective</text>
    <rect x="340" y="185" width="220" height="104" fill="#ffffff" stroke="#355f91" stroke-width="3"/>
    <text x="364" y="225" font-weight="700" fill="#355f91">2 Select drivers</text>
    <text x="364" y="255" fill="#1f2328">ASRs, constraints,</text>
    <text x="364" y="280" fill="#1f2328">quality scenarios</text>
    <rect x="612" y="185" width="220" height="104" fill="#ffffff" stroke="#14756f" stroke-width="3"/>
    <text x="636" y="225" font-weight="700" fill="#14756f">3 Choose concepts</text>
    <text x="636" y="255" fill="#1f2328">patterns, tactics,</text>
    <text x="636" y="280" fill="#1f2328">reference models</text>
    <rect x="884" y="185" width="270" height="104" fill="#ffffff" stroke="#4e7348" stroke-width="3"/>
    <text x="908" y="225" font-weight="700" fill="#4e7348">4 Instantiate elements</text>
    <text x="908" y="255" fill="#1f2328">responsibilities, relations,</text>
    <text x="908" y="280" fill="#1f2328">interfaces</text>
    <rect x="762" y="410" width="250" height="112" fill="#ffffff" stroke="#b8841f" stroke-width="3"/>
    <text x="786" y="450" font-weight="700" fill="#b8841f">5 Document views</text>
    <text x="786" y="480" fill="#1f2328">module, C&amp;C, allocation,</text>
    <text x="786" y="505" fill="#1f2328">rationale</text>
    <rect x="438" y="410" width="250" height="112" fill="#ffffff" stroke="#1f2328" stroke-width="3"/>
    <text x="462" y="450" font-weight="700" fill="#1f2328">6 Review + refine</text>
    <text x="462" y="480" fill="#1f2328">validate ASRs, expose risks,</text>
    <text x="462" y="505" fill="#1f2328">feed next iteration</text>
    <rect x="124" y="410" width="250" height="112" fill="#ffffff" stroke="#667078" stroke-width="3"/>
    <text x="148" y="450" font-weight="700" fill="#667078">7 Repeat</text>
    <text x="148" y="480" fill="#1f2328">decompose next element or</text>
    <text x="148" y="505" fill="#1f2328">address next driver</text>
  </g>
  <path d="M288 237 L340 237" stroke="#14756f" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M560 237 L612 237" stroke="#14756f" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M832 237 L884 237" stroke="#14756f" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1018 289 C1050 348 1002 384 940 410" fill="none" stroke="#14756f" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M762 466 L688 466" stroke="#14756f" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M438 466 L374 466" stroke="#14756f" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M124 466 C60 430 50 270 68 237" fill="none" stroke="#14756f" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
