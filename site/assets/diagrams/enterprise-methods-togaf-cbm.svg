<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="980" viewBox="0 0 1680 980" role="img" aria-labelledby="title desc">
  <title id="title">TOGAF ADM and CBM enterprise architecture methods</title>
  <desc id="desc">A review-slide grounded diagram showing TOGAF ADM as process and CBM as capability granularity.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#333"/></marker>
    <style>
      .bg{fill:#fffdf8}.panel{fill:#fff;stroke:#d9d2c4;stroke-width:2}.phase{fill:#e9eef5;stroke:#38669b;stroke-width:2}.center{fill:#1f2328}.cbm{fill:#e9f4f2;stroke:#14756f;stroke-width:2}.cap{fill:#fff7e8;stroke:#bd861b;stroke-width:2}.line{stroke:#333;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .title{font:700 38px Georgia,"Times New Roman",serif;fill:#1f2328}.sub{font:600 18px "Avenir Next","PingFang SC",sans-serif;fill:#667078}.h{font:800 23px "Avenir Next","PingFang SC",sans-serif;fill:#1f2328}.txt{font:500 20px "Avenir Next","PingFang SC",sans-serif;fill:#1f2328}.small{font:500 16px "Avenir Next","PingFang SC",sans-serif;fill:#667078}.white{font:800 22px "Avenir Next","PingFang SC",sans-serif;fill:#fff}
    </style>
  </defs>
  <rect class="bg" width="1680" height="980"/>
  <text class="title" x="56" y="64">Enterprise Architecture Methods: TOGAF is process, CBM is capability granularity</text>
  <text class="sub" x="56" y="96">Ground truth: Lecture 14 Course Review - 3 pages 13 and 15. P1 understanding; vendor case details are lower priority.</text>

  <rect class="panel" x="56" y="132" width="760" height="720" rx="16"/>
  <text class="h" x="90" y="176">TOGAF / ADM architecture development cycle</text>
  <circle class="center" cx="436" cy="476" r="104"/>
  <text class="white" x="436" y="452" text-anchor="middle">Requirements</text>
  <text class="white" x="436" y="490" text-anchor="middle">management</text>
  <g>
    <rect class="phase" x="318" y="260" width="236" height="58" rx="12"/><text class="txt" x="436" y="296" text-anchor="middle">Preliminary</text>
    <rect class="phase" x="574" y="292" width="172" height="58" rx="12"/><text class="txt" x="660" y="328" text-anchor="middle">Vision</text>
    <rect class="phase" x="574" y="422" width="172" height="58" rx="12"/><text class="txt" x="660" y="458" text-anchor="middle">Business</text>
    <rect class="phase" x="574" y="552" width="172" height="66" rx="12"/>
    <text class="txt" x="660" y="582" text-anchor="middle">Information</text>
    <text class="txt" x="660" y="606" text-anchor="middle">systems</text>
    <rect class="phase" x="318" y="676" width="236" height="58" rx="12"/><text class="txt" x="436" y="712" text-anchor="middle">Technology</text>
    <rect class="phase" x="126" y="552" width="172" height="58" rx="12"/><text class="txt" x="212" y="588" text-anchor="middle">Opportunities</text>
    <rect class="phase" x="126" y="422" width="172" height="58" rx="12"/><text class="txt" x="212" y="458" text-anchor="middle">Migration</text>
    <rect class="phase" x="126" y="292" width="172" height="58" rx="12"/><text class="txt" x="212" y="328" text-anchor="middle">Governance</text>
    <rect class="phase" x="318" y="184" width="236" height="58" rx="12"/><text class="txt" x="436" y="220" text-anchor="middle">Change management</text>
  </g>
  <text class="small" x="90" y="812">Governance keywords: architecture board, architecture repository, enterprise continuum.</text>

  <rect class="panel" x="864" y="132" width="760" height="720" rx="16"/>
  <text class="h" x="900" y="176">CBM / Component Business Model</text>
  <rect class="cap" x="914" y="226" width="660" height="112" rx="14"/>
  <text class="h" x="1244" y="268" text-anchor="middle">Business Capability</text>
  <text class="txt" x="1244" y="306" text-anchor="middle">Core: identify stable enterprise capabilities</text>
  <path class="line" d="M1244 342V404"/>
  <rect class="cbm" x="914" y="408" width="660" height="126" rx="14"/>
  <text class="h" x="1244" y="452" text-anchor="middle">Business Components</text>
  <text class="txt" x="1244" y="492" text-anchor="middle">Capability carriers: cohesive, loosely coupled, reusable, composable</text>
  <g transform="translate(914 600)">
    <rect class="panel" x="0" y="0" width="300" height="96" rx="12"/><text class="h" x="150" y="38" text-anchor="middle">Process clustering</text><text class="small" x="150" y="68" text-anchor="middle">five-level process + verb library</text>
    <rect class="panel" x="360" y="0" width="300" height="96" rx="12"/><text class="h" x="510" y="38" text-anchor="middle">Data clustering</text><text class="small" x="510" y="68" text-anchor="middle">5W1H + A/B/C/D data layers</text>
  </g>
  <text class="txt" x="900" y="760">Answer: TOGAF tells “what process develops EA”;</text>
  <text class="txt" x="900" y="794">CBM tells “what granularity decomposes business capability”.</text>
  <text class="small" x="900" y="832">Methods can be mixed. Do not draw CBM as a database table or microservice diagram.</text>
</svg>
