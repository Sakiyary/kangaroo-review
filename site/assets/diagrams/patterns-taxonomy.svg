<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Architectural patterns taxonomy</title>
  <desc id="desc">How styles, patterns, and tactics relate to module, component-connector, and allocation perspectives.</desc>
  <rect width="1280" height="720" fill="#fffdf8"/>
  <text x="68" y="82" font-family="Georgia,serif" font-size="34" font-weight="700" fill="#1f2328">Styles, patterns, tactics: answer by granularity and intent</text>
  <text x="68" y="120" font-family="Avenir Next,Arial,sans-serif" font-size="18" fill="#667078">常见失分点：把 tactic 当 pattern，或只写名字不写解决的质量驱动力与代价。</text>
  <g font-family="Avenir Next,Arial,sans-serif">
    <rect x="95" y="205" width="315" height="315" fill="#ffffff" stroke="#b54634" stroke-width="3"/>
    <text x="135" y="250" font-size="24" font-weight="700" fill="#b54634">Style</text>
    <text x="135" y="294" font-size="18" fill="#1f2328">A family of structures.</text>
    <text x="135" y="328" font-size="18" fill="#1f2328">Examples:</text>
    <text x="135" y="360" font-size="17" fill="#1f2328">Layered, Pipe-filter,</text>
    <text x="135" y="387" font-size="17" fill="#1f2328">C/S, Event-driven</text>
    <text x="135" y="452" font-size="15" fill="#667078">回答：上下文、元素、关系、约束。</text>
    <rect x="482" y="205" width="315" height="315" fill="#ffffff" stroke="#355f91" stroke-width="3"/>
    <text x="522" y="250" font-size="24" font-weight="700" fill="#355f91">Pattern</text>
    <text x="522" y="294" font-size="18" fill="#1f2328">A named reusable solution.</text>
    <text x="522" y="328" font-size="18" fill="#1f2328">Examples:</text>
    <text x="522" y="360" font-size="17" fill="#1f2328">Broker, MVC, SOA,</text>
    <text x="522" y="387" font-size="17" fill="#1f2328">Microservices</text>
    <text x="522" y="452" font-size="15" fill="#667078">回答：适用场景、好处、局限。</text>
    <rect x="869" y="205" width="315" height="315" fill="#ffffff" stroke="#14756f" stroke-width="3"/>
    <text x="909" y="250" font-size="24" font-weight="700" fill="#14756f">Tactic</text>
    <text x="909" y="294" font-size="18" fill="#1f2328">A small design move.</text>
    <text x="909" y="328" font-size="18" fill="#1f2328">Examples:</text>
    <text x="909" y="360" font-size="17" fill="#1f2328">Heartbeat, cache,</text>
    <text x="909" y="387" font-size="17" fill="#1f2328">load balancing, auth</text>
    <text x="909" y="452" font-size="15" fill="#667078">回答：改善哪个质量属性。</text>
  </g>
</svg>
