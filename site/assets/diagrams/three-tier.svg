<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Three-tier architecture answer diagram</title>
  <desc id="desc">Presentation, business logic, and data access layers with Views and Beyond documentation notes.</desc>
  <rect width="1280" height="720" fill="#fffdf8"/>
  <text x="68" y="82" font-family="Georgia,serif" font-size="34" font-weight="700" fill="#1f2328">Three-tier design: a drawable exam answer</text>
  <text x="68" y="120" font-family="Avenir Next,Arial,sans-serif" font-size="18" fill="#667078">画图后必须写职责、接口、质量属性和设计理由；不要只画三块。</text>
  <g font-family="Avenir Next,Arial,sans-serif">
    <rect x="130" y="170" width="460" height="100" fill="#ffffff" stroke="#b54634" stroke-width="3"/>
    <text x="160" y="230" font-size="25" font-weight="700" fill="#b54634">Presentation Tier</text>
    <text x="660" y="230" font-size="19" fill="#1f2328">ATM UI / booking web page; handles input and display only.</text>
    <rect x="130" y="315" width="460" height="100" fill="#ffffff" stroke="#355f91" stroke-width="3"/>
    <text x="160" y="375" font-size="25" font-weight="700" fill="#355f91">Business Logic Tier</text>
    <text x="660" y="362" font-size="19" fill="#1f2328">Rules: withdraw limit, ticket availability, order workflow, transaction boundary.</text>
    <rect x="130" y="460" width="460" height="100" fill="#ffffff" stroke="#14756f" stroke-width="3"/>
    <text x="160" y="520" font-size="25" font-weight="700" fill="#14756f">Data Access Tier</text>
    <text x="660" y="507" font-size="19" fill="#1f2328">Repository/DAO hides database details and persistence protocols.</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1f2328"/>
    </marker>
  </defs>
  <path d="M360 270 L360 315" stroke="#1f2328" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M360 415 L360 460" stroke="#1f2328" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="650" y="560" width="470" height="72" fill="#f0eadf" stroke="#d9d2c4" stroke-width="2"/>
  <text x="675" y="602" font-family="Avenir Next,Arial,sans-serif" font-size="18" font-weight="700" fill="#1f2328">Views and Beyond package: primary view + element catalog + interfaces + rationale + view mappings.</text>
</svg>
