<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Views and Beyond documentation package</title>
  <desc id="desc">Module, component-connector, allocation views and beyond-view documentation.</desc>
  <rect width="1280" height="720" fill="#fffdf8"/>
  <text x="68" y="82" font-family="Georgia,serif" font-size="34" font-weight="700" fill="#1f2328">Views and Beyond: documentation is a package, not one diagram</text>
  <text x="68" y="120" font-family="Avenir Next,Arial,sans-serif" font-size="18" fill="#667078">答题时说明视图服务不同 stakeholder；再补 beyond-view information 和视图映射。</text>
  <g font-family="Avenir Next,Arial,sans-serif">
    <rect x="90" y="200" width="300" height="130" fill="#ffffff" stroke="#b54634" stroke-width="3"/>
    <text x="128" y="246" font-size="23" font-weight="700" fill="#b54634">Module Viewtype</text>
    <text x="128" y="282" font-size="18" fill="#1f2328">decomposition, uses, layer</text>
    <text x="128" y="309" font-size="15" fill="#667078">开发组织、可修改性</text>
    <rect x="490" y="200" width="300" height="130" fill="#ffffff" stroke="#355f91" stroke-width="3"/>
    <text x="528" y="246" font-size="23" font-weight="700" fill="#355f91">C&amp;C Viewtype</text>
    <text x="528" y="282" font-size="18" fill="#1f2328">runtime components, connectors</text>
    <text x="528" y="309" font-size="15" fill="#667078">性能、可用性、交互</text>
    <rect x="890" y="200" width="300" height="130" fill="#ffffff" stroke="#14756f" stroke-width="3"/>
    <text x="928" y="246" font-size="23" font-weight="700" fill="#14756f">Allocation Viewtype</text>
    <text x="928" y="282" font-size="18" fill="#1f2328">software to hardware/team/files</text>
    <text x="928" y="309" font-size="15" fill="#667078">部署、运维、项目管理</text>
    <rect x="240" y="445" width="800" height="120" fill="#f0eadf" stroke="#d9d2c4" stroke-width="3"/>
    <text x="280" y="492" font-size="22" font-weight="700" fill="#1f2328">Beyond-view information</text>
    <text x="280" y="528" font-size="18" fill="#1f2328">documentation roadmap, element catalog, interface specs, rationale, glossary, view mappings</text>
  </g>
  <line x1="240" y1="330" x2="430" y2="445" stroke="#1f2328" stroke-width="3"/>
  <line x1="640" y1="330" x2="640" y2="445" stroke="#1f2328" stroke-width="3"/>
  <line x1="1040" y1="330" x2="850" y2="445" stroke="#1f2328" stroke-width="3"/>
</svg>
